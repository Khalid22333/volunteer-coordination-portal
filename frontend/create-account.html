<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSUS Career Center Volunteer – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #3a5a2e;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #d1d5db;
      --white: #ffffff;
      --error: #dc2626;
    }
    body { font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; overflow: hidden; }

    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 72px;
      background: var(--white);
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand h1 { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 600; color: var(--text); white-space: nowrap; }

    .form-section { margin-top: 48px; display: flex; flex-direction: column; gap: 20px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 0.875rem; font-weight: 500; color: var(--text); }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 16px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
      background: var(--white); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #b0b7c3; }
    input:focus { border-color: var(--green-dark); box-shadow: 0 0 0 3px rgba(58,90,46,0.1); }

    .terms-row { display: flex; align-items: center; gap: 8px; }
    .terms-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--green-dark); cursor: pointer; }
    .terms-row label { font-size: 0.85rem; color: var(--muted); font-weight: 300; cursor: pointer; }
    .terms-row a { color: var(--text); font-weight: 500; text-decoration: underline; }

    .btn-primary {
      width: 100%; padding: 13px; border: none; border-radius: 8px;
      background: var(--green-dark); color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #2d4724; box-shadow: 0 4px 14px rgba(58,90,46,0.25); }
    .btn-primary:active { transform: scale(0.99); }

    .divider { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--muted); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .social-row { display: flex; gap: 12px; }
    .btn-social {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; color: var(--text); cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-social:hover { border-color: #aab; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .signin-prompt { text-align: center; font-size: 0.875rem; color: var(--muted); }
    .signin-prompt a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .signin-prompt a:hover { text-decoration: underline; }

    .error-msg { font-size: 0.78rem; color: var(--error); display: none; }

    .right { width: 50%; overflow: hidden; }
    .right img { width: 100%; height: 100%; object-fit: cover; display: block; }

    @media (max-width: 768px) {
      .right { display: none; }
      .left { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="brand"><h1>Get Started Now</h1></div>

    <div class="form-section">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" autocomplete="name"/>
        <span class="error-msg" id="name-error">Name is required.</span>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
        <span class="error-msg" id="email-error">Please enter a valid email address.</span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password"/>
        <span class="error-msg" id="pass-error">Password must be at least 8 characters.</span>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">I agree to the <a href="#">terms &amp; policy</a></label>
      </div>

      <button class="btn-primary" onclick="handleSignup()">Signup</button>

      <p class="signin-prompt">Have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <div class="right">
    <img src="https://images.unsplash.com/photo-1525498128493-380d1990a112?w=900&q=80" alt="Monstera plant"/>
  </div>

  <script src="auth.js"></script>
  <script>
    function handleSignup() {
      const name     = document.getElementById('name');
      const email    = document.getElementById('email');
      const password = document.getElementById('password');
      const terms    = document.getElementById('terms');

      document.getElementById('name-error').style.display  = 'none';
      document.getElementById('email-error').style.display = 'none';
      document.getElementById('pass-error').style.display  = 'none';

      let valid = true;
      if (!name.value.trim())                              { document.getElementById('name-error').style.display  = 'block'; valid = false; }
      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) { document.getElementById('email-error').style.display = 'block'; valid = false; }
      if (!password.value || password.value.length < 8)   { document.getElementById('pass-error').style.display  = 'block'; valid = false; }
      if (!terms.checked) { alert('Please agree to the terms & policy to continue.'); valid = false; }
      if (!valid) return;

      fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     name.value.trim(),
          email:    email.value.trim(),
          password: password.value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert(data.error === 'email already registered'
            ? 'That email is already registered. Try logging in instead.'
            : data.error);
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        // If the user was bounced here from a protected action, send them back.
        // Otherwise, drop them on the landing page.
        window.location.href = consumeRedirectAfterLogin();
      })
      .catch(() => alert('Network error. Please try again.'));
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  </script>
</body>
</html>
