<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSUS Career Center Volunteer – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #3a5a2e;
      --green-mid: #4a7a3a;
      --green-light: #f0f4ee;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #d1d5db;
      --white: #ffffff;
      --error: #dc2626;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 72px;
      background: var(--white);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
    }

    .brand p {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
    }

    .form-section {
      margin-top: 42px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .forgot-link {
      font-size: 0.8rem;
      color: var(--green-dark);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.7; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: #b0b7c3; }
    input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(58, 90, 46, 0.1);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .remember-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--green-dark);
      cursor: pointer;
    }
    .remember-row label {
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }
    .btn:active { transform: scale(0.99); }

    .btn-primary {
      background: var(--green-dark);
      color: var(--white);
    }
    .btn-primary:hover { background: #2d4724; box-shadow: 0 4px 14px rgba(58,90,46,0.25); }

    .btn-admin {
      background: var(--green-mid);
      color: var(--white);
    }
    .btn-admin:hover { background: #3a6030; box-shadow: 0 4px 14px rgba(58,90,46,0.2); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-row {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-social:hover {
      border-color: #aab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .btn-social svg { flex-shrink: 0; }

    .signup-prompt {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .signup-prompt a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    .signup-prompt a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 0.8rem;
      color: var(--error);
      display: none;
    }

    /* RIGHT PANEL */
    .right {
      width: 50%;
      position: relative;
      overflow: hidden;
    }
    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .right-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.08));
    }

    /* Carousel dots */
    .carousel-nav {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s;
    }
    .dot.active { background: rgba(255,255,255,0.95); }

    @media (max-width: 768px) {
      .right { display: none; }
      .left { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="brand">
      <h1>CSUS Career Center Volunteer</h1>
      <p>Enter your credentials to access your account</p>
    </div>

    <div class="form-section">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
        <span class="error-msg" id="email-error">Please enter a valid email address.</span>
      </div>

      <div class="field">
        <div class="field-header">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">forgot password</a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <span class="error-msg" id="pass-error">Password is required.</span>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember"/>
        <label for="remember">Remember for 30 days</label>
      </div>

      <button class="btn btn-primary" onclick="handleLogin()">Login</button>
      <button class="btn btn-admin" onclick="handleAdminLogin()">Admin Login</button>

      <div class="divider">or</div>

      <div class="social-row">
        <button class="btn-social">
          <!-- Google icon -->
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18L12.048 13.56c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>
        <button class="btn-social">
          <!-- Apple icon -->
          <svg width="16" height="18" viewBox="0 0 814 1000" fill="currentColor"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 376.6 0 248 0 124.8c0-68.9 13.6-136.8 44.2-196.8A437.07 437.07 0 0 1 155.4 1.7C196.3-5.4 234.7 0 270.2 12.3a437.57 437.57 0 0 1 111.6 60.7c60.2-40.2 134.9-64 217.2-64 70.9 0 144.8 19.1 198.9 56.9.6.4 1.3.8 1.9 1.2z"/></svg>
          Sign in with Apple
        </button>
      </div>

      <p class="signup-prompt">Don't have an account? <a href="create-account.html">Sign Up</a></p>
    </div>
  </div>

  <div class="right">
    <img src="https://images.unsplash.com/photo-1525498128493-380d1990a112?w=900&q=80" alt="Green leaves" id="bg-img"/>
    <div class="right-overlay"></div>
    <div class="carousel-nav">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailErr = document.getElementById('email-error');
      const passErr = document.getElementById('pass-error');
      let valid = true;

      emailErr.style.display = 'none';
      passErr.style.display = 'none';

      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
        emailErr.style.display = 'block';
        email.focus();
        valid = false;
      }
      if (!password.value) {
        passErr.style.display = 'block';
        if (valid) password.focus();
        valid = false;
      }

      if (!valid) return;

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert(data.error === 'invalid credentials'
            ? 'Incorrect email or password. Please try again.'
            : data.error);
          return;
        }
        // Store JWT for future authenticated requests
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/landing.html';
      })
      .catch(() => alert('Network error. Please try again.'));
    }

    function handleAdminLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please enter your email and password.');
        return;
      }

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert('Admin login failed: ' + data.error);
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/admin.html';
      })
      .catch(() => alert('Network error. Please try again.'));
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
