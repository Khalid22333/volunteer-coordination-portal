<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSUS Career Center Volunteer – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #3a5a2e;
      --green-mid: #4a7a3a;
      --green-light: #f0f4ee;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #d1d5db;
      --white: #ffffff;
      --error: #dc2626;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 72px;
      background: var(--white);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
    }

    .brand p {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
    }

    .form-section {
      margin-top: 42px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .forgot-link {
      font-size: 0.8rem;
      color: var(--green-dark);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.7; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: #b0b7c3; }
    input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(58, 90, 46, 0.1);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .remember-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--green-dark);
      cursor: pointer;
    }
    .remember-row label {
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }
    .btn:active { transform: scale(0.99); }

    .btn-primary {
      background: var(--green-dark);
      color: var(--white);
    }
    .btn-primary:hover { background: #2d4724; box-shadow: 0 4px 14px rgba(58,90,46,0.25); }

    .btn-admin {
      background: var(--green-mid);
      color: var(--white);
    }
    .btn-admin:hover { background: #3a6030; box-shadow: 0 4px 14px rgba(58,90,46,0.2); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-row {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-social:hover {
      border-color: #aab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .btn-social svg { flex-shrink: 0; }

    .signup-prompt {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .signup-prompt a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    .signup-prompt a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 0.8rem;
      color: var(--error);
      display: none;
    }

    /* RIGHT PANEL */
    .right {
      width: 50%;
      position: relative;
      overflow: hidden;
    }
    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .right-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.08));
    }

    /* Carousel dots */
    .carousel-nav {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s;
    }
    .dot.active { background: rgba(255,255,255,0.95); }

    @media (max-width: 768px) {
      .right { display: none; }
      .left { width: 100%; padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="brand">
      <h1>CSUS Career Center Volunteer</h1>
      <p>Enter your credentials to access your account</p>
    </div>

    <div class="form-section">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
        <span class="error-msg" id="email-error">Please enter a valid email address.</span>
      </div>

      <div class="field">
        <div class="field-header">
          <label for="password">Password</label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <span class="error-msg" id="pass-error">Password is required.</span>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember"/>
        <label for="remember">Remember for 30 days</label>
      </div>

      <button class="btn btn-primary" onclick="handleLogin()">Login</button>

      <p class="signup-prompt">Don't have an account? <a href="create-account.html">Sign Up</a></p>
    </div>
  </div>

  <div class="right">
    <img src="https://images.unsplash.com/photo-1525498128493-380d1990a112?w=900&q=80" alt="Green leaves" id="bg-img"/>
    <div class="right-overlay"></div>
    <div class="carousel-nav">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailErr = document.getElementById('email-error');
      const passErr = document.getElementById('pass-error');
      let valid = true;

      emailErr.style.display = 'none';
      passErr.style.display = 'none';

      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
        emailErr.style.display = 'block';
        email.focus();
        valid = false;
      }
      if (!password.value) {
        passErr.style.display = 'block';
        if (valid) password.focus();
        valid = false;
      }

      if (!valid) return;

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert(data.error === 'invalid credentials'
            ? 'Incorrect email or password. Please try again.'
            : data.error);
          return;
        }
        // Store JWT for future authenticated requests
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        // Send the user back to whatever protected page bounced them here
        // (or the landing page if they came directly to login).
        window.location.href = consumeRedirectAfterLogin();
      })
      .catch(() => alert('Network error. Please try again.'));
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
