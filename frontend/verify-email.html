<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email – CSUS Career Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #3a5a2e;
      --green-tint: #eaf2e3;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #d1d5db;
      --white: #ffffff;
      --error: #dc2626;
      --error-tint: #fef2f2;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: #f5f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 40px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .icon.success { background: var(--green-tint); color: var(--green-dark); }
    .icon.error   { background: var(--error-tint); color: var(--error); }
    .icon.loading { background: #f3f4f6; color: var(--muted); }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    p { color: var(--muted); font-size: 0.95rem; line-height: 1.55; }

    .email { color: var(--text); font-weight: 500; }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 22px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      border: none;
    }
    .btn-primary { background: var(--green-dark); color: var(--white); }
    .btn-primary:hover { background: #2d4724; box-shadow: 0 4px 14px rgba(58,90,46,0.25); }
    .btn-primary:active { transform: scale(0.99); }

    .btn-secondary {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
      margin-left: 8px;
    }
    .btn-secondary:hover { border-color: #aab; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon loading"><div class="spinner"></div></div>
    <h1 id="title">Verifying your email…</h1>
    <p id="message">Hang tight, this should only take a second.</p>
    <div id="actions"></div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Read the token out of the URL. The verification email links here with
    // ?token=<long hex string>.
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const card    = document.getElementById('card');
    const icon    = card.querySelector('.icon');
    const title   = document.getElementById('title');
    const message = document.getElementById('message');
    const actions = document.getElementById('actions');

    function renderSuccess(email, alreadyVerified) {
      icon.className = 'icon success';
      icon.textContent = '✓';
      title.textContent = alreadyVerified ? 'Already verified' : 'Email verified!';
      message.innerHTML = alreadyVerified
        ? `<span class="email">${escapeHtml(email)}</span> is already verified — you're all set.`
        : `Thanks! <span class="email">${escapeHtml(email)}</span> is verified. You can now apply to volunteer events.`;
      actions.innerHTML = `
        <a class="btn btn-primary" href="csus-landing-page-events.html">Continue to events</a>
      `;
    }

    function renderError(text, opts = {}) {
      icon.className = 'icon error';
      icon.textContent = '!';
      title.textContent = 'Verification failed';
      message.textContent = text;

      // For expired-link cases: offer a resend, but only if the user is
      // logged in (the resend endpoint requires auth so we know which
      // account to re-send to). If they're not logged in, send them to
      // login first.
      const resend = opts.canResend ? (
        isLoggedIn()
          ? `<button class="btn btn-primary" id="resend-btn">Resend verification email</button>`
          : `<a class="btn btn-primary" href="login.html">Log in to resend</a>`
      ) : '';
      const back = `<a class="btn btn-secondary" href="csus-landing-page-events.html">Back to home</a>`;
      actions.innerHTML = resend + back;

      const btn = document.getElementById('resend-btn');
      if (btn) btn.addEventListener('click', handleResend);
    }

    async function handleResend() {
      const btn = document.getElementById('resend-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { ...authHeader(), 'Content-Type': 'application/json' },
        });
        const data = await res.json();
        if (data.ok) {
          message.textContent = 'New verification email sent. Check your inbox.';
          btn.textContent = 'Sent ✓';
        } else {
          btn.disabled = false;
          btn.textContent = 'Resend verification email';
          alert(data.error || 'Could not resend right now. Please try again.');
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Resend verification email';
        alert('Network error. Please try again.');
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function verify() {
      if (!token) {
        renderError('No verification token found in the link. Make sure you clicked the full link from your email.');
        return;
      }

      try {
        const res = await fetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (data.ok) {
          renderSuccess(data.email, !!data.alreadyVerified);
        } else {
          // The expired case is the only one where "resend" makes sense —
          // an invalid/never-existed token can't be resent because we
          // don't know who to resend to.
          const isExpired = /expired/i.test(data.error || '');
          renderError(
            data.error || 'This verification link is not valid.',
            { canResend: isExpired }
          );
        }
      } catch {
        renderError('Network error. Please check your connection and try again.');
      }
    }

    verify();
  </script>
</body>
</html>
