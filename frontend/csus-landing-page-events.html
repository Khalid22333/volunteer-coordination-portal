<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .shell {
    font-family: 'DM Sans', sans-serif;
    background: #f0f0f0;
    border-radius: 10px;
    overflow: hidden;
    border: 0.5px solid #ccc;
    min-height: 700px;
  }

  /* ── Header ── */
  .header {
    background: #1b3d1b;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
  }

  .logo {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
    color: #f5c518;
    z-index: 2;
    position: relative;
  }

  .stars-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    gap: 0;
    justify-content: center;
    pointer-events: none;
    padding: 0 120px;
  }

  .s {
    color: #f5c518;
    display: inline-block;
    line-height: 1;
  }

  .sa {
    font-size: 28px;
    margin: 0 6px;
  }

  .sb {
    font-size: 18px;
    margin: 0 5px;
  }

  .sc {
    font-size: 13px;
    margin: 0 4px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #888;
    z-index: 2;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid rgba(255, 255, 255, 0.25);
  }

  /* ── Body ── */
  .body {
    display: flex;
    min-height: 620px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 165px;
    background: #fff;
    border-right: 0.5px solid #ddd;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 18px 0 0;
    flex-shrink: 0;
  }

  .sidebar-top {}

  .dash-title {
    font-size: 19px;
    font-weight: 600;
    color: #111;
    padding: 0 16px 14px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    font-size: 13.5px;
    color: #555;
    cursor: pointer;
    transition: background 0.13s;
  }

  .nav-item:hover {
    background: #f5f5f5;
  }

  .nav-item.active {
    color: #111;
    font-weight: 500;
  }

  .nav-icon {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  .logout-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    font-size: 13.5px;
    color: #555;
    cursor: pointer;
    border-top: 0.5px solid #eee;
    transition: background 0.13s;
    margin-bottom: 0;
  }

  .logout-row:hover {
    background: #f5f5f5;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    background: #fff;
    padding: 22px 24px 0;
    display: flex;
    flex-direction: column;
  }

  .main-inner {
    background: #fff;
    border-radius: 8px;
    border: 0.5px solid #e0e0e0;
    flex: 1;
    padding: 22px 22px 0;
    display: flex;
    flex-direction: column;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
  }

  .section-title {
    font-size: 21px;
    font-weight: 600;
    color: #111;
  }

  .chevron {
    background: none;
    border: none;
    font-size: 20px;
    color: #555;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  /* ── Card ── */
  .card {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .card-img {
    background: #d9d9d9;
    aspect-ratio: 4/3;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .img-txt {
    font-size: 13px;
    color: #999;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.16s;
  }

  .card-img:hover .card-overlay {
    opacity: 1;
  }

  .btn-view {
    padding: 7px 16px;
    background: #f5c518;
    color: #1b3d1b;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.12s;
  }

  .btn-view:hover {
    opacity: 0.88;
  }

  .card-meta {
    padding: 7px 0 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .date-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .ev-month {
    font-size: 11px;
    font-weight: 600;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .ev-day {
    font-size: 21px;
    font-weight: 500;
    color: #111;
    line-height: 1.1;
  }

  .ev-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-top: 1px;
  }

  .ev-time {
    font-size: 11px;
    color: #888;
  }

  .ev-name {
    font-size: 13px;
    font-weight: 500;
    color: #111;
  }

  .btn-apply {
    margin-top: 8px;
    width: 100%;
    padding: 8px;
    background: #1b3d1b;
    color: #f5c518;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.14s;
    position: relative;
    overflow: hidden;
  }

  .btn-apply:hover:not(:disabled) {
    background: #254f25;
  }

  .btn-apply.applied {
    background: #c8e6c9;
    color: #2e7d32;
    cursor: default;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(245, 197, 24, 0.4);
    transform: scale(0);
    animation: rpl 0.45s linear;
    pointer-events: none;
  }

  @keyframes rpl {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  /* ── Stats bar ── */
  .stats {
    margin: 18px 0 0;
    border-top: 0.5px solid #e8e8e8;
    padding: 12px 0 14px;
    display: flex;
    gap: 28px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-val {
    font-size: 17px;
    font-weight: 600;
    color: #111;
  }

  .stat-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
  }

  .stat-div {
    width: 0.5px;
    height: 28px;
    background: #ddd;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(50px);
    background: #1b3d1b;
    color: #f5c518;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>

<script>
  /**
   * Event data — open positions/events available for sign-up.
   * Fields: id, month, day, timeRange, name. You can replace the image field values with actual image URLs or paths as needed.
   */
  const events = [
  { id: 1, month: "Feb",   day: 10, timeRange: "2:00pm - 5:00pm",  name: "Bingo & Trivia Nights",  image: "assets/images/bingoNight.jpg" },
  { id: 2, month: "April", day: 23, timeRange: "12:00pm - 5:00pm", name: "Career Fair",            image: "assets/images/careerFair.png" },
  { id: 3, month: "April", day: 30, timeRange: "10:00pm - 5:00pm", name: "Academic Tutoring",      image: "assets/images/tutorting.png" },
  { id: 4, month: "MAY",   day: 12, timeRange: "1:00pm - 6:00pm",  name: "Neighborhood Clean-up",  image: "assets/images/communityCleanup.webp" },
  { id: 5, month: "MAY",   day: 16, timeRange: "12:30pm - 3:00pm", name: "Resume Workshop",        image: "assets/images/resumeWorkshop.png" },
  { id: 6, month: "MAY",   day: 22, timeRange: "1:00pm - 4:00pm",  name: "Food Bank",              image: "assets/images/foodBank.jpg" },
];

  /** Tracks which event IDs the user has applied to this session. */
  const appliedSet = new Set();

  /**
   * showToast — displays a brief notification message at the bottom of the screen.
   * @param {string} msg - The message to display.
   */
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 2600);
  }

  /**
   * updateStats — refreshes the stats bar counters after an apply action.
   */
  function updateStats() {
    document.getElementById("appliedStat").textContent = appliedSet.size;
    document.getElementById("openStat").textContent = events.length - appliedSet.size;
  }

  /**
   * handleApply — records an apply press for an event.
   * Prevents duplicate applies, triggers ripple, updates button state and stats.
   * @param {number} id - Event ID.
   * @param {HTMLButtonElement} btn - The clicked apply button.
   * @param {string} name - Event name for the toast confirmation.
   * @param {MouseEvent} e - Click event for ripple positioning.
   */
  function handleApply(id, btn, name, e) {
    if (appliedSet.has(id)) return;
    appliedSet.add(id);

    // Ripple effect
    const rpl = document.createElement("span");
    rpl.className = "ripple";
    const r = btn.getBoundingClientRect();
    const sz = Math.max(r.width, r.height);
    rpl.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX - r.left - sz / 2}px;top:${e.clientY - r.top - sz / 2}px`;
    btn.appendChild(rpl);
    setTimeout(() => rpl.remove(), 500);

    btn.textContent = "✓ Applied";
    btn.classList.add("applied");
    btn.disabled = true;

    updateStats();
    showToast("Applied to: " + name);
  }

  /**
   * handleView — triggered when user clicks "View Event" on the image hover overlay.
   * In production this would open a detail page or modal.
   * @param {string} name - Event name.
   */
  function handleView(name) {
    showToast("Viewing: " + name);
  }

  /**
   * createCard — constructs and returns a single event card element.
   * Includes the image placeholder, hover overlay (View Event),
   * date/time metadata, and the Apply button.
   * @param {Object} ev - Event object from the events array.
   * @returns {HTMLElement} The assembled card element.
   */
  function createCard(ev) {
    const card = document.createElement("div");
    card.className = "card";

    // Image with hover overlay
    const img = document.createElement("div");
    img.className = "card-img";

   // Function to create an img element with the event image, styled to cover the card area
const lbl = document.createElement("img");
lbl.src = ev.image;
lbl.alt = ev.name;
lbl.style.cssText = "width:100%;height:100%;object-fit:cover;position:absolute;inset:0;";

    const overlay = document.createElement("div");
    overlay.className = "card-overlay";

    const btnView = document.createElement("button");
    btnView.className = "btn-view";
    btnView.textContent = "View Event";
    btnView.onclick = (e) => { e.stopPropagation(); handleView(ev.name); };

    overlay.appendChild(btnView);
    img.append(lbl, overlay);

    // Metadata row
    const meta = document.createElement("div");
    meta.className = "card-meta";

    const dateCol = document.createElement("div");
    dateCol.className = "date-col";

    const monthEl = document.createElement("span");
    monthEl.className = "ev-month";
    monthEl.textContent = ev.month;

    const dayEl = document.createElement("span");
    dayEl.className = "ev-day";
    dayEl.textContent = ev.day;

    dateCol.append(monthEl, dayEl);

    const info = document.createElement("div");
    info.className = "ev-info";

    const timeEl = document.createElement("span");
    timeEl.className = "ev-time";
    timeEl.textContent = ev.timeRange;

    const nameEl = document.createElement("span");
    nameEl.className = "ev-name";
    nameEl.textContent = ev.name;

    info.append(timeEl, nameEl);
    meta.append(dateCol, info);

    // Apply button
    const btnApply = document.createElement("button");
    btnApply.className = "btn-apply";
    btnApply.textContent = "Apply";
    btnApply.onclick = (e) => handleApply(ev.id, btnApply, ev.name, e);

    card.append(img, meta, btnApply);
    return card;
  }
/**
 * handleLogout — clears the user session and redirects to the login page.
 */

// Function to handle logout action, redirecting the user to the login page
 function handleLogout() {
  window.location.href = "login.html"; 
}
  /**
   * renderGrid — renders all event cards into the grid on page load.
   */
  function renderGrid() {
    const grid = document.getElementById("eventsGrid");
    events.forEach(ev => grid.appendChild(createCard(ev)));
    updateStats();
  }

  renderGrid();
</script>
